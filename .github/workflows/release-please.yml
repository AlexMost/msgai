name: release-please

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # Use PAT if set; otherwise GITHUB_TOKEN (requires repo Settings > Actions > General:
          # "Allow GitHub Actions to create and approve pull requests").
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
